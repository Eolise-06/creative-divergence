<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创意发散</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle" title="切换暗色模式">
    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- SVG Canvas -->
  <svg id="canvas">
    <g id="transform-layer">
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </g>
  </svg>

  <!-- Welcome Hint -->
  <div id="welcome-hint" class="welcome-hint">
    <div class="welcome-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </div>
    <p>输入一个词，开始发散联想</p>
  </div>

  <!-- Input Area -->
  <div id="input-area" class="input-area input-center">
    <form id="input-form" class="input-form">
      <input
        id="word-input"
        type="text"
        placeholder="输入一个词语..."
        autocomplete="off"
        maxlength="30"
      />
      <button type="submit" id="submit-btn" class="submit-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>
    <div id="input-error" class="input-error"></div>
  </div>

  <!-- Canvas Controls -->
  <div id="controls" class="canvas-controls">
    <button id="ctrl-zoom-in" class="ctrl-btn" title="放大">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/></svg>
    </button>
    <button id="ctrl-zoom-out" class="ctrl-btn" title="缩小">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M8 11h6"/></svg>
    </button>
    <button id="ctrl-fit" class="ctrl-btn" title="适应视图">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
    <button id="ctrl-clear" class="ctrl-btn ctrl-btn-danger" title="清空画布">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <span id="zoom-display" class="zoom-display">100%</span>
  </div>

  <!-- History Toggle Button -->
  <button id="history-toggle" class="history-toggle" title="历史记录">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
  </button>

  <!-- History Drawer Overlay -->
  <div id="drawer-overlay" class="drawer-overlay hidden"></div>

  <!-- History Drawer -->
  <div id="history-drawer" class="history-drawer">
    <div class="drawer-header">
      <h3>历史记录</h3>
      <button id="drawer-close" class="drawer-close">&times;</button>
    </div>
    <div class="drawer-list" id="drawer-list"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
