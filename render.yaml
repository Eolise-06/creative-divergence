services:
  - type: web
    name: creative-divergence
    runtime: docker
    repo: https://github.com/Eolise-06/creative-divergence
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
